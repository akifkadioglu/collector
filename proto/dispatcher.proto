// dispatcher.proto
syntax = "proto3";

package collector;
option go_package = "github.com/accretional/collector/gen/collector";

import "common.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto"; // <--- ADDED THIS IMPORT

// ============================================================================
// CollectiveDispatcher Service (aka DynamicDispatcher in design)
// Maintains Collections: DispatchServers, Connections, Dispatches, Collectors
// ============================================================================

// Stored in DispatchServers Collection
message DispatchServer {
  string id = 1;
  string address = 2;
  repeated string namespaces = 3;
  repeated string capabilities = 4;
  Metadata metadata = 5;
  google.protobuf.Timestamp last_heartbeat = 6;
}

// Stored in Connections Collection
// Tracks both current state and history of collector-to-collector connections
message Connection {
  string id = 1;
  string source_collector_id = 2;
  string target_collector_id = 3;
  string address = 4;
  repeated string shared_namespaces = 5;
  Metadata metadata = 6;

  // Lifecycle timestamps
  google.protobuf.Timestamp connected_at = 7;
  google.protobuf.Timestamp disconnected_at = 8;  // Set when connection ends
  google.protobuf.Timestamp last_activity = 9;
  google.protobuf.Timestamp last_heartbeat = 10;

  // Session tracking for crash recovery
  // Each collector restart generates a new session_id
  // On startup, connections from previous sessions are marked STALE
  string session_id = 11;

  // Usage statistics
  int64 request_count = 12;
  int64 bytes_sent = 13;
  int64 bytes_received = 14;
  int32 reconnect_count = 15;  // Times this source->target pair has reconnected

  // Connection status
  ConnectionStatus status = 16;
  string status_message = 17;  // Human-readable status details (e.g., error message)

  enum ConnectionStatus {
    UNKNOWN = 0;
    ACTIVE = 1;
    DISCONNECTED = 2;  // Clean disconnect
    FAILED = 3;        // Error-induced disconnect
    STALE = 4;         // From previous session, status unknown
  }
}

// Stored in Dispatches Collection (tracks dispatch history)
message Dispatch {
  string id = 1;
  string namespace = 2;
  ServiceTypeRef service = 3;
  string method_name = 4;
  string source_collector_id = 5;
  string target_collector_id = 6;
  Status result_status = 7;
  Metadata metadata = 8;
  google.protobuf.Timestamp completed_at = 9;
}

// Stored in Collectors Collection (cluster peer info)
message Collector {
  string id = 1;
  string address = 2;
  repeated string namespaces = 3;
  repeated string capabilities = 4;
  bool is_direct_peer = 5;
  // vs indirect/discovered
  Metadata metadata = 6;
  google.protobuf.Timestamp last_seen = 7;
}

// API Messages
message ServeRequest {
  string namespace = 1;
  ServiceTypeRef service = 2;
  string method_name = 3;
  google.protobuf.Any input = 4;
  map<string, string> execution_context = 5;
}

message ServeResponse {
  Status status = 1;
  google.protobuf.Any output = 2;
  string executor_id = 3;
}

message ConnectRequest {
  string address = 1;
  repeated string namespaces = 2;
  map<string, string> metadata = 3;
}

message ConnectResponse {
  Status status = 1;
  string connection_id = 2;
  repeated string shared_namespaces = 3;
  string target_collector_id = 4;
}

message DispatchRequest {
  string namespace = 1;
  ServiceTypeRef service = 2;
  string method_name = 3;
  google.protobuf.Any input = 4;
  string target_collector_id = 5;  // Optional, auto-route if empty
  map<string, string> routing_hints = 6;
}

message DispatchResponse {
  Status status = 1;
  google.protobuf.Any output = 2;
  string handled_by_collector_id = 3;
}

service CollectiveDispatcher {
  rpc Serve(ServeRequest) returns (ServeResponse);
  rpc Connect(ConnectRequest) returns (ConnectResponse);
  rpc Dispatch(DispatchRequest) returns (DispatchResponse);
}
